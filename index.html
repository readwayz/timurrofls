<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тимур Сотников | Edit Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #d1c4e9;
            --deep-purple: #7e57c2;
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: #0f0c29; /* Темный глубокий фон для контраста */
            color: #fff;
            overflow-x: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Светлый эдит-фон */
            min-height: 200vh;
        }

        /* Фоновый текст "ПОНТАНУТСЯ" */
        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-size: 12vw;
            font-weight: 900;
            color: rgba(126, 87, 194, 0.05);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        /* Эффект шума на фоне */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        /* Плавающие частицы фона */
        .orb {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(126, 87, 194, 0.3) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20vw, 20vh); }
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            text-transform: uppercase;
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 50%, #6a11cb 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientText 3s linear infinite;
            letter-spacing: -2px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        @keyframes gradientText {
            to { background-position: 200% center; }
        }

        /* Кнопки соцсетей */
        .social-links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tg { background: rgba(0, 136, 204, 0.2); color: #0088cc; }
        .vk { background: rgba(74, 118, 168, 0.2); color: #4a76a8; }
        .ds { background: rgba(88, 101, 242, 0.2); color: #5865f2; cursor: default; }

        .btn:hover:not(.ds) {
            transform: translateY(-5px) scale(1.05);
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* Контейнер картинок */
        .content {
            padding: 100px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .meme-wrapper {
            margin-bottom: 150px; /* Большое расстояние для эффекта появления */
            opacity: 0;
            transform: translateY(100px) rotateX(-20deg);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .meme-wrapper.show {
            opacity: 1;
            transform: translateY(0) rotateX(0);
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 15px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .glass-card img {
            width: 100%;
            border-radius: 20px;
            display: block;
            transition: transform 0.5s ease;
        }

        .glass-card:hover img {
            transform: scale(1.02);
        }

        .footer-info {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #7e57c2;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="bg-text">ОН ХОТЕЛ ПОНТАНУТСЯ</div>
    <div class="orb" style="top: 20%; left: 10%;"></div>
    <div class="orb" style="bottom: 10%; right: 10%; background: radial-gradient(circle, rgba(37, 117, 252, 0.2) 0%, rgba(255,255,255,0) 70%);"></div>

    <header>
        <h1 id="title">Тимур Сотников</h1>
    
        <p class="subtitle" style="color: #2575fc; font-weight: bold; margin-top: 10px;">
            Главный поставщик кринжа и базара
        </p>
       
        <p class="subtitle" style="color: #2575fc; font-style: italic; opacity: 0.9;">
            (он хотел понтанутся)
        </p>

    <div class="social-links">
        <a href="https://t.me/Asdfcvbu" target="_blank" class="btn tg">
            <i class="fa-brands fa-telegram"></i> My Telegram
        </a>
        <a href="https://vk.com/tmsot" target="_blank" class="btn vk">
            <i class="fa-brands fa-vk"></i> My VK
        </a>
        <div class="btn ds">
            <i class="fa-brands fa-discord"></i> My Discord: tmsot
        </div>
    </div>
</header>
    <div class="content" id="meme-container">
        </div>

    <div class="footer-info">че в сосал вася?</div>

    <script>
        // Параллакс заголовка
        const title = document.getElementById('title');
        window.addEventListener('mousemove', (e) => {
            let x = (e.clientX - window.innerWidth / 2) / 30;
            let y = (e.clientY - window.innerHeight / 2) / 30;
            title.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Создаем массив с 10 мемами
        const container = document.getElementById('meme-container');
        for (let i = 1; i <= 10; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'meme-wrapper';
            wrapper.innerHTML = `
                <div class="glass-card">
                    <img src="${i}.jpg" alt="Meme ${i}" onerror="this.src='https://via.placeholder.com/600x400/d1c4e9/7e57c2?text=MEME+${i}'">
                </div>
            `;
            container.appendChild(wrapper);
        }

        // Плавное появление при скролле (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.meme-wrapper').forEach(el => observer.observe(el));

        // Эффект параллакса для фонового текста
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            document.querySelector('.bg-text').style.transform = 
                `translate(-50%, -50%) rotate(-10deg) translateX(${scrolled * 0.1}px)`;
        });
    </script>
</body>
</html>
